# Publish workflow — build and publish to npm on version tags
#
# Triggered by tags matching v* (e.g. v0.1.0, v0.2.0-rc.1).
#
# Secrets required:
#   NPM_TOKEN  — npm automation token with publish permissions
#   (public package @tflo/browser-events — no OTP needed for
#    automation tokens)

name: Publish to npm

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    # Grant id-token permission for npm provenance (npm 9+)
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout tflo-browser-events
        uses: actions/checkout@v4
        with:
          path: tflo-browser-events

      - name: Checkout companion tflo monorepo
        uses: actions/checkout@v4
        with:
          repository: matt-cochran/tflo
          path: tflo
          fetch-depth: 1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM (web target) — into src/wasm/
        working-directory: tflo/tflo-cep-wasm
        run: |
          mkdir -p $GITHUB_WORKSPACE/tflo-browser-events/src/wasm
          wasm-pack build \
            --target web \
            --release \
            --out-dir $GITHUB_WORKSPACE/tflo-browser-events/src/wasm \
            --out-name tflo_cep_wasm

      - name: Build WASM (nodejs target) — tests depend on this
        working-directory: tflo/tflo-cep-wasm
        run: |
          wasm-pack build \
            --target nodejs \
            --release \
            --out-dir pkg-node \
            --out-name tflo_cep_wasm

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tflo-browser-events/package-lock.json

      - name: Install dependencies
        working-directory: tflo-browser-events
        run: npm ci

      - name: Lint
        working-directory: tflo-browser-events
        run: npm run lint

      - name: Run tests
        working-directory: tflo-browser-events
        run: npm test

      - name: Build (TS compilation)
        working-directory: tflo-browser-events
        run: npm run build:ts

      - name: Configure npm authentication
        working-directory: tflo-browser-events
        run: |
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > .npmrc

      - name: Publish to npm
        working-directory: tflo-browser-events
        run: |
          # 'npm publish --provenance' uses id-token for attestation;
          # falls back to regular publish when provenance isn't supported.
          npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
